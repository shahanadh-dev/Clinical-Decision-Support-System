<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAssist AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            background: linear-gradient(135deg,#0f172a,#1e3a8a);
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Segoe UI,sans-serif;
        }

        .login-card{
            width:100%;
            max-width:420px;
            background:white;
            border-radius:20px;
            padding:35px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .title{
            text-align:center;
            margin-bottom:5px;
            color:#1e3a8a;
            font-weight:700;
        }

        .subtitle{
            text-align:center;
            color:#6c757d;
            font-size:14px;
            margin-bottom:25px;
        }

        .btn-custom{
            background:#1e3a8a;
            color:white;
            width:100%;
        }

        .btn-custom:hover{
            background:#172554;
            color:white;
        }
    </style>
</head>

<body>

<div class="login-card">

    <h2 class="title">MediAssist AI</h2>

    <p class="subtitle">
        Mobile Application for Medical Assistance using ML Techniques
    </p>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text"
                   class="form-control"
                   name="username"
                   placeholder="Enter Username">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   class="form-control"
                   name="pass"
                   placeholder="Enter Password">
        </div>

        <button type="submit" class="btn btn-custom">
            Login
        </button>

        <div class="text-center mt-3">
            <a href="{% url 'signup' %}">
                Create New Account
            </a>
        </div>

    </form>

</div>

</body>
</html>
