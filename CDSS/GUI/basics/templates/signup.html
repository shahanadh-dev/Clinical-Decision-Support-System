<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAssist AI - Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Segoe UI,sans-serif;
        }

        .register-card{
            width:100%;
            max-width:500px;
            background:white;
            border-radius:20px;
            padding:35px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .title{
            text-align:center;
            color:#1e3a8a;
            font-weight:700;
        }

        .subtitle{
            text-align:center;
            color:#6c757d;
            margin-bottom:25px;
            font-size:14px;
        }

        .btn-custom{
            width:100%;
            background:#1e3a8a;
            color:white;
        }

        .btn-custom:hover{
            background:#172554;
            color:white;
        }
    </style>
</head>

<body>

<div class="register-card">

    <h2 class="title">MediAssist AI</h2>

    <p class="subtitle">
        Medical Assistance Registration Portal
    </p>

    <form method="post">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text"
                   class="form-control"
                   name="username"
                   placeholder="Create Username">
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email"
                   class="form-control"
                   name="email"
                   placeholder="Enter Email">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   class="form-control"
                   name="password1"
                   placeholder="Enter Password">
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password"
                   class="form-control"
                   name="password2"
                   placeholder="Confirm Password">
        </div>

        <button type="submit" class="btn btn-custom">
            Create Account
        </button>

        <div class="text-center mt-3">
            <a href="{% url 'login' %}">
                Already have an account? Login
            </a>
        </div>

    </form>

</div>

</body>
</html>
